{% extends "base.html" %} {% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="mb-4">
      <div class="eyebrow">SETUP</div>
      <h1>Tell me what we are working on now.</h1>
      <p>
        I will use this information to build the sponsorship workspace and
        prospect pipeline.
      </p>
    </div>

    <form method="post" class="card p-4 shadow-sm">
      <label class="form-label fw-bold"
        >What are we seeking sponsors for right now?</label
      >
      <input
        class="form-control mb-3"
        name="initiative"
        value="2026 Ms. Full-Figured North Carolina Pageant"
        required
      />

      <label class="form-label fw-bold"
        >How much support are we trying to secure?</label
      >
      <input
        class="form-control mb-3"
        name="target"
        value="$25,000 cash + $10,000 in-kind"
        required
      />

      <label class="form-label fw-bold">By what date?</label>
      <input
        class="form-control mb-3"
        name="deadline"
        value="October 1, 2026"
        required
      />

      <label class="form-label fw-bold"
        >Who will sponsors reach or impact?</label
      >
      <textarea class="form-control mb-3" name="audience" rows="3" required>
Delegates, pageant attendees, families, supporters, local community members, social media followers, and women connected to confidence, service, and empowerment.</textarea
      >

      <label class="form-label fw-bold"
        >What do we most need sponsors to help pay for or provide?</label
      >
      <textarea class="form-control mb-4" name="needs" rows="3" required>
Venue costs, printing, program book, delegate experiences, awards, photography, beauty services, fashion support, hospitality, community service support, and event production.</textarea
      >

      <button class="btn btn-gold btn-lg">
        Build My Sponsorship Workspace
      </button>
    </form>
  </div>
</div>
{% endblock %}
