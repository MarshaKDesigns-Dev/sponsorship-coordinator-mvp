<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      {% block title %}Marsha AI · Sponsorship Coordinator{% endblock %}
    </title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">
          Marsha AI · Sponsorship Coordinator
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavigation"
          aria-controls="mainNavigation"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavigation">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{{ url_for('home') }}">
              Home
            </a>

            <a class="nav-link" href="{{ url_for('setup') }}">
              Organization Setup
            </a>

            <a class="nav-link" href="{{ url_for('workspace') }}">
              Workspace
            </a>

            <a class="nav-link" href="{{ url_for('show_pipeline') }}">
              Pipeline
            </a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div
            class="alert alert-{{ 'success' if category == 'success' else 'warning' }}"
            role="alert"
          >
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
